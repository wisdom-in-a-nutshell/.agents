# Canonical portable baseline for ~/.codex/config.toml
# Keep this focused on stable settings only.

cli_auth_credentials_store = "file"
mcp_oauth_credentials_store = "file"
model = "gpt-5.4"
model_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "danger-full-access"
web_search = "live"
personality = "pragmatic"
suppress_unstable_features_warning = true

[features]
js_repl = true
fast_mode = true
apps = false

[agents.external_researcher]
description = "Read-only researcher for information outside the local codebase and runtime."
config_file = "agents/external_researcher.toml"

[agents.visual_reviewer]
description = "Read-only reviewer for visual work such as screenshots, layouts, hierarchy, and clarity."
config_file = "agents/visual_reviewer.toml"
nickname_candidates = ["Lens", "Critic", "Review"]

[tui]
theme = "catppuccin-macchiato"
status_line = ["model-with-reasoning", "context-remaining", "current-dir", "codex-version", "context-window-size", "session-id", "fast-mode"]

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

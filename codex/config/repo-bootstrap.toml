# Canonical repo-local Codex bootstrap registry.
# Edit this file, then run:
#   ~/.agents/codex/scripts/sync-repo-codex-configs.sh --apply
#   ~/.agents/codex/scripts/sync-trusted-projects.sh --apply

[discovery]
roots = ["~/GitHub"]
extra_repos = ["~/.agents"]

[mcp_presets.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_presets.xcode]
command = "xcrun"
args = ["mcpbridge"]
startup_timeout_sec = 180
tool_timeout_sec = 120

[repos."~/.agents"]
mcp_presets = ["openaiDeveloperDocs"]

[repos."~/GitHub/codexclaw"]
mcp_presets = ["xcode", "openaiDeveloperDocs"]

[repos."~/GitHub/codexclaw-workspaces"]
mcp_presets = ["openaiDeveloperDocs"]

[repos."~/GitHub/win"]
mcp_presets = ["openaiDeveloperDocs"]

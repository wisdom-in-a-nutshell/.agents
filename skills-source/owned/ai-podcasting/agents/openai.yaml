interface:
  display_name: "AI Podcasting"
  short_description: "Submit episodes and update intro copy via API, including local file uploads."
  default_prompt: "Use the ai_podcasting_client to list backlog episodes, submit new episodes, and patch intro/title/thumbnail copy through backend API routes. For intro updates, send only the fields the user wants to change. If the user gives a local file path, use the aip_local_upload_helper first to get a public URL, then continue. If the user says 'submit' ambiguously, first clarify whether they mean a new main episode submission or an intro update."
